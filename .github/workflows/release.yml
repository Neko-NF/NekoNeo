name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta.*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options: [stable, beta]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NekoNeo ${{ github.ref_name }}'
          releaseBody: 'See [CHANGELOG](https://github.com/Neko-NF/NekoNeo/releases) for details.'
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          args: --target x86_64-pc-windows-msvc

      - name: Generate SHA256
        shell: bash
        run: |
          cd src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          for dir in msi nsis; do
            if [ -d "$dir" ]; then
              (cd "$dir" && sha256sum *.exe *.msi 2>/dev/null || true)
            fi
          done > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload SHA256
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/SHA256SUMS.txt
